name: Build Installers

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'installers/**'
      - '.github/workflows/build-installers.yml'

jobs:
  run-tests:
    name: Run tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create venv and install Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Start app in background
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\.venv\Scripts\python.exe" -ArgumentList "app.py" -PassThru
          "APP_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $maxAttempts = 30
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri "http://127.0.0.1:3175" -UseBasicParsing -TimeoutSec 5 | Out-Null
              Write-Host "App is reachable at http://127.0.0.1:3175"
              break
            }
            catch {
              if ($attempt -eq $maxAttempts) {
                throw "App did not start within the expected time."
              }

              Start-Sleep -Seconds 2
            }
          }

      - name: Run test script
        shell: pwsh
        run: .\test.ps1 -PlaywrightReporter "line,junit" -PlaywrightJunitOutputFile "test-results/playwright-junit.xml"

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/playwright-junit.xml
          if-no-files-found: warn

      - name: Publish test summary
        if: always()
        shell: pwsh
        run: |
          $reportPath = Join-Path $PWD "test-results/playwright-junit.xml"
          if (-not (Test-Path $reportPath)) {
            "### Test Results`nJUnit report not found at $reportPath" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            exit 0
          }

          [xml]$report = Get-Content -Path $reportPath
          $suite = $null

          if ($report.testsuites) {
            $suite = $report.testsuites
          }
          elseif ($report.testsuite) {
            $suite = $report.testsuite
          }

          if (-not $suite) {
            "### Test Results`nCould not parse JUnit XML." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            exit 0
          }

          $total = [int]($suite.tests)
          $failures = [int]($suite.failures)
          $errors = [int]($suite.errors)
          $skipped = [int]($suite.skipped)
          $passed = $total - $failures - $errors - $skipped

          @(
            "### Test Results"
            "- Passed: $passed"
            "- Failed: $failures"
            "- Errors: $errors"
            "- Skipped: $skipped"
            "- Total: $total"
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Stop app
        if: always()
        shell: pwsh
        run: |
          if ($env:APP_PID) {
            Stop-Process -Id $env:APP_PID -Force -ErrorAction SilentlyContinue
          }

  package-installers:
    name: Package installer (${{ matrix.os }})
    needs: run-tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare package folder
        shell: bash
        run: |
          mkdir -p dist/installers/linux dist/installers/macos dist/installers/windows
          cp docker-compose.yml dist/
          cp Dockerfile dist/
          cp requirements.txt dist/
          cp app.py dist/
          cp -r static dist/
          cp -r templates dist/
          cp ps-helpers.ps1 dist/
          cp installers/README.md dist/

      - name: Package Linux installer
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cp installers/linux/install-trade-wijs.sh dist/installers/linux/
          cp installers/linux/startup-trade-wijs.sh dist/installers/linux/
          chmod +x dist/installers/linux/install-trade-wijs.sh
          chmod +x dist/installers/linux/startup-trade-wijs.sh
          tar -czf trade-wijs-installer-linux.tar.gz -C dist .

      - name: Package macOS installer
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cp installers/macos/install-trade-wijs.sh dist/installers/macos/
          cp installers/macos/startup-trade-wijs.sh dist/installers/macos/
          chmod +x dist/installers/macos/install-trade-wijs.sh
          chmod +x dist/installers/macos/startup-trade-wijs.sh
          tar -czf trade-wijs-installer-macos.tar.gz -C dist .

      - name: Package Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -Path dist/installers/windows -ItemType Directory -Force | Out-Null
          Copy-Item installers/windows/install-trade-wijs.ps1 dist/installers/windows/
          Copy-Item installers/windows/startup-trade-wijs.ps1 dist/installers/windows/
          Compress-Archive -Path dist/* -DestinationPath trade-wijs-installer-windows.zip -Force

      - name: Build Windows self-extracting installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $sevenZip = Get-Command 7z.exe -ErrorAction SilentlyContinue
          if (-not $sevenZip) {
            choco install 7zip -y
            $sevenZip = Get-Command 7z.exe -ErrorAction SilentlyContinue
          }

          if (-not $sevenZip) {
            throw "7z.exe not found after installation attempt."
          }

          $sevenZipDir = Split-Path -Parent $sevenZip.Source
          $sfxModulePath = Join-Path $sevenZipDir "7z.sfx"
          if (-not (Test-Path $sfxModulePath)) {
            throw "7z.sfx not found at $sfxModulePath"
          }

          & $sevenZip.Source a -t7z trade-wijs-installer-windows.7z .\dist\*

          $sfxConfigPath = Join-Path $PWD "sfx-config.txt"
          $sfxConfigLines = @(
            ';!@Install@!UTF-8!'
            'Title="Trade Wijs Installer"'
            'RunProgram="powershell.exe -NoProfile -ExecutionPolicy Bypass -File installers\\windows\\install-trade-wijs.ps1"'
            'GUIMode="2"'
            ';!@InstallEnd@!'
          )
          $sfxConfigLines | Set-Content -Path $sfxConfigPath -Encoding UTF8

          cmd /c "copy /b \"$sfxModulePath\" + \"$sfxConfigPath\" + \"$PWD\trade-wijs-installer-windows.7z\" \"$PWD\trade-wijs-installer-windows.exe\""

          Remove-Item trade-wijs-installer-windows.7z -ErrorAction SilentlyContinue
          Remove-Item $sfxConfigPath -ErrorAction SilentlyContinue

      - name: Upload Linux artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: trade-wijs-installer-linux
          path: trade-wijs-installer-linux.tar.gz

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: trade-wijs-installer-macos
          path: trade-wijs-installer-macos.tar.gz

      - name: Upload Windows artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: trade-wijs-installer-windows
          path: |
            trade-wijs-installer-windows.zip
            trade-wijs-installer-windows.exe
